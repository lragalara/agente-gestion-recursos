services:
  mock_bc:
    build: ./mock_bc
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./mock_bc:/app
    networks:
      - agente-net
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  orchestrator:
    build: ./orchestrator
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./orchestrator:/app
    depends_on:
      - mock_bc
    networks:
      - agente-net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  agente-net:
    driver: bridge
